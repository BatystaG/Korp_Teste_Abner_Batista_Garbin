<mat-toolbar color="primary" class="toolbar">
  <button mat-icon-button (click)="sidenav.toggle()" class="menu-button">
    <mat-icon>menu</mat-icon>
  </button>
  <img src="/assets/Logo.png" alt="Sistema de Notas Fiscais" class="logo">
</mat-toolbar>

<mat-sidenav-container class="container">

  <mat-sidenav #sidenav [(opened)]="sidenavOpen" mode="side" class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/produtos" routerLinkActive="ativo">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Produtos</span>
      </a>
      <a mat-list-item routerLink="/notas" routerLinkActive="ativo">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span matListItemTitle>Notas Fiscais</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="conteudo">
    <router-outlet />
  </mat-sidenav-content>

</mat-sidenav-container>
